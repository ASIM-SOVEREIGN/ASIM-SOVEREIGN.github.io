<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — ASIM SOVEREIGN</title>
    <style>
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }
        h1 { color: #A62C9D; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 500; margin-bottom: 0.3rem; font-size: 0.9rem; }
        input, textarea, select {
            width: 100%;
            padding: 0.6rem;
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: #A62C9D; outline: none; }
        textarea { min-height: 120px; resize: vertical; }
        button {
            background: #A62C9D;
            color: #fff;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #7B2FBE; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 1rem; padding: 0.5rem; border-radius: 8px; display: none; }
        #status.success { background: rgba(16, 185, 129, 0.15); color: #10b981; display: block; }
        #status.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; display: block; }
        .back-link { display: block; margin-top: 1.5rem; text-align: center; color: #8a8a93; text-decoration: none; }
        .back-link:hover { color: #A62C9D; }
    </style>
</head>
<body>
    <h1>🜂 Forge Support</h1>
    <p style="color: #8a8a93; margin-bottom: 1.5rem;">Open a ticket. It becomes a GitHub Issue in the ASIM SOVEREIGN repo.</p>

    <form id="ticketForm">
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="e.g. Scura" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="receipt">Purchase Receipt (optional)</label>
            <input type="text" id="receipt" placeholder="Ko-fi / PayPal receipt ID">
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="e.g. Sandbox crash on Tier 4" required>
        </div>
        <div class="form-group">
            <label for="message">Description</label>
            <textarea id="message" placeholder="What happened? Include logs, steps to reproduce, and error messages." required></textarea>
        </div>
        <button type="submit" id="submitBtn">Submit Ticket</button>
        <div id="status"></div>
    </form>

    <a href="/" class="back-link">← Return to the Forge</a>

    <script src="support.js"></script>
</body>
</html>
